version: '3.8'

services:
  backend:
    build:
      context: ./agentcarbon/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/agentcarbon
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - postgres
      - neo4j
      - qdrant
    deploy:
      resources:
        limits:
          memory: 300M

  frontend:
    build:
      context: ./agentcarbon/frontend/carbon-footprint-insights
    ports:
      - "80:8080"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 150M

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentcarbon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 200M

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_heap_max__size: 256M
      NEO4J_dbms_memory_pagecache_size: 128M
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 300M

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 200M

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
